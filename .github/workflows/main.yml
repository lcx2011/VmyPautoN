name: Auto Update VPN Nodes

on:
  schedule:
    # 每天北京时间早上 8 点运行 (UTC 时间 0 点)
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动点击触发

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允许推送代码

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright pyyaml requests
        playwright install chromium

    - name: Run Scraper
      run: python main.py --force-update

    - name: Commit and Push Changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        # 只提交我们生成的配置文件
        git add config.yml sing-box.json
        # 如果有改动才提交
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto update VPN nodes [skip ci]" && git push)
